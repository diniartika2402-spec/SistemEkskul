<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Kelola Siswa</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet"
href="../assets/css/style.css">

<link rel="stylesheet"
href="../assets/css/dashboard.css">

<link rel="stylesheet"
href="../assets/css/admin.css">

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<section class="dashboard">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar glass">

    <div class="brand">

        <div class="brand-logo">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <div>
            <h2>Admin Panel</h2>
            <small>Management System</small>
        </div>

    </div>

    <p class="menu-title">ADMIN MENU</p>

    <ul class="menu">

        <li onclick="location.href='dashboard-admin.html'">
            <i class="fa-solid fa-chart-pie"></i>
            Dashboard
        </li>

        <li class="active">
            <i class="fa-solid fa-users"></i>
            Kelola Siswa
        </li>

        <li onclick="location.href='kelola-ekskul.html'">
            <i class="fa-solid fa-medal"></i>
            Kelola Ekskul
        </li>

        <li onclick="location.href='laporan.html'">
            <i class="fa-solid fa-chart-column"></i>
            Laporan
        </li>

        <li onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </li>

    </ul>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

<!-- ================= TOPBAR ================= -->
<div class="topbar">

    <div>

        <h1>Kelola Siswa</h1>

        <p>
            Monitoring data dan minat siswa
        </p>

    </div>

</div>

<!-- ================= SEARCH ================= -->
<div class="card glass dashboard-card">

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
        type="text"
        id="searchSiswa"
        placeholder="Cari siswa..."
        onkeyup="searchSiswa()">

    </div>

</div>

<!-- ================= TABLE ================= -->
<div class="card glass dashboard-card">

    <div class="section-title">

        <h3>Data Siswa</h3>

        <span>Realtime Data</span>

    </div>

    <div class="table-wrapper">

        <table class="modern-table">

            <thead>

                <tr>

                    <th>Nama</th>

                    <th>Kelas</th>

                    <th>Minat</th>

                    <th>Status</th>

                    <th>Aksi</th>

                </tr>

            </thead>

            <tbody id="siswaTable">

            </tbody>

        </table>

    </div>

</div>

</main>

</section>

<!-- JS -->
<script src="../assets/js/script.js"></script>

<script src="../assets/js/admin-siswa.js"></script>

<script>
checkLogin();
</script>

<!-- ================= MODAL DETAIL ================= -->

<div class="modal" id="siswaModal">

    <div class="modal-content glass siswa-modal">

        <!-- CLOSE -->
        <button class="close-btn"
        onclick="closeModalSiswa()">

            <i class="fa-solid fa-xmark"></i>

        </button>

        <!-- HEADER -->
        <div class="siswa-header">

            <div class="siswa-avatar">

                <i class="fa-solid fa-user"></i>

            </div>

            <div>

                <h2 id="detailNama">
                    Nama Siswa
                </h2>

                <p id="detailKelas">
                    Kelas
                </p>

            </div>

        </div>

        <!-- BODY -->
        <div class="siswa-detail-grid">

            <div class="detail-box">

                <small>Minat Utama</small>

                <h3 id="detailMinat">
                    Kreatif
                </h3>

            </div>

            <div class="detail-box">

                <small>Status</small>

                <h3 id="detailStatus">
                    Aktif
                </h3>

            </div>

        </div>

    </div>

</div>

</body>
</html>
