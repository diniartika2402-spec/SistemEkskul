<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>EduSmart - Login</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- CSS -->
<link rel="stylesheet"
href="assets/css/style.css">

<link rel="stylesheet"
href="assets/css/responsive.css">

<style>

/* =========================================================
   BODY
========================================================= */

body{

    margin:0;

    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #111827,
    #1e293b);

    min-height:100vh;

    overflow:hidden;

    color:white;

    position:relative;

}

/* =========================================================
   BACKGROUND EFFECT
========================================================= */

.bg-circle{

    position:absolute;

    border-radius:50%;

    filter:blur(120px);

    z-index:1;

}

.bg1{

    width:350px;
    height:350px;

    background:
    rgba(56,189,248,.25);

    top:-100px;
    left:-100px;

}

.bg2{

    width:300px;
    height:300px;

    background:
    rgba(129,140,248,.25);

    bottom:-100px;
    right:-100px;

}

/* =========================================================
   PAGE
========================================================= */

.login-page{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;

    position:relative;

    z-index:2;

}

/* =========================================================
   CONTAINER
========================================================= */

.login-container{

    width:100%;

    max-width:1200px;

    display:grid;

    grid-template-columns:1.1fr .9fr;

    gap:60px;

    align-items:center;

}

/* =========================================================
   HERO
========================================================= */

.hero-text h1{

    font-size:58px;

    line-height:1.1;

    margin-bottom:20px;

    font-weight:800;

}

.hero-text h1 span{

    background:
    linear-gradient(
    135deg,
    #38bdf8,
    #818cf8);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

}

.hero-text p{

    font-size:18px;

    line-height:1.8;

    opacity:.8;

    max-width:550px;

}

.hero-feature{

    margin-top:35px;

    display:flex;

    flex-wrap:wrap;

    gap:15px;

}

.feature-item{

    display:flex;

    align-items:center;

    gap:10px;

    padding:14px 18px;

    border-radius:18px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.08);

    font-size:14px;

}

.feature-item i{

    color:#38bdf8;

}

/* =========================================================
   LOGIN CARD
========================================================= */

.login-card{

    padding:40px;

    border-radius:32px;

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.1);

    backdrop-filter:blur(22px);

    box-shadow:
    0 20px 50px rgba(0,0,0,.35);

}

/* =========================================================
   LOGO
========================================================= */

.logo{

    width:90px;
    height:90px;

    margin:auto;

    margin-bottom:20px;

    border-radius:28px;

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:36px;

    background:
    linear-gradient(
    135deg,
    #38bdf8,
    #818cf8);

}

.login-card h2{

    text-align:center;

    font-size:34px;

    margin-bottom:8px;

}

.login-card .subtitle{

    text-align:center;

    opacity:.7;

    margin-bottom:30px;

}

/* =========================================================
   INPUT
========================================================= */

.input-group{

    margin-bottom:18px;

}

.input-group label{

    display:block;

    margin-bottom:10px;

    font-size:14px;

    font-weight:500;

}

.input-box{

    display:flex;

    align-items:center;

    gap:14px;

    padding:16px 18px;

    border-radius:18px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid transparent;

    transition:.3s;

}

.input-box:focus-within{

    border-color:
    rgba(56,189,248,.7);

    box-shadow:
    0 0 0 4px rgba(56,189,248,.12);

}

.input-box i{

    color:#94a3b8;

    font-size:16px;

}

.input-box input,
.input-box select{

    width:100%;

    border:none;
    outline:none;

    background:none;

    color:white;

    font-size:15px;

    font-family:'Poppins',sans-serif;

}

.input-box option{

    background:#111827;

}

/* =========================================================
   BUTTON
========================================================= */

.login-btn{

    width:100%;

    border:none;

    padding:16px;

    border-radius:18px;

    margin-top:12px;

    font-size:15px;

    font-weight:600;

    color:white;

    cursor:pointer;

    transition:.3s;

    background:
    linear-gradient(
    135deg,
    #38bdf8,
    #818cf8);

}

.login-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 12px 25px rgba(56,189,248,.35);

}

/* =========================================================
   REGISTER BUTTON
========================================================= */

.register-link{

    margin-top:22px;

    text-align:center;

    font-size:14px;

    opacity:.85;

}

.register-link a{

    color:#38bdf8;

    text-decoration:none;

    font-weight:600;

}

/* =========================================================
   RESPONSIVE
========================================================= */

@media(max-width:950px){

    .login-container{

        grid-template-columns:1fr;

    }

    .hero-text{

        text-align:center;

    }

    .hero-text p{

        margin:auto;

    }

    .hero-feature{

        justify-content:center;

    }

}

@media(max-width:600px){

    .hero-text h1{

        font-size:42px;

    }

    .login-card{

        padding:30px 24px;

    }

}

</style>

</head>

<body>

<!-- BG -->
<div class="bg-circle bg1"></div>
<div class="bg-circle bg2"></div>

<!-- =========================================================
     LOGIN PAGE
========================================================= -->

<section class="login-page">

    <div class="login-container">

        <!-- ================= HERO ================= -->
        <div class="hero-text">

            <h1>
                Sistem <span>Pemetaan Minat</span>
                dan Ekstrakurikuler
            </h1>

            <p>
                Temukan minat, bakat, dan
                rekomendasi ekstrakurikuler terbaik
                dengan sistem modern berbasis digital.
            </p>

            <div class="hero-feature">

                <div class="feature-item">
                    <i class="fa-solid fa-brain"></i>
                    Tes Minat Modern
                </div>

                <div class="feature-item">
                    <i class="fa-solid fa-medal"></i>
                    Rekomendasi Ekskul
                </div>

                <div class="feature-item">
                    <i class="fa-solid fa-chart-line"></i>
                    Dashboard Interaktif
                </div>

            </div>

        </div>

        <!-- ================= LOGIN CARD ================= -->
        <div class="login-card">

            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>

            <h2>Masuk</h2>

            <p class="subtitle">
                Login untuk melanjutkan
            </p>

            <!-- USERNAME -->
            <div class="input-group">

                <label>Username</label>

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                    type="text"
                    id="username"
                    placeholder="Masukkan username">

                </div>

            </div>

            <!-- PASSWORD -->
            <div class="input-group">

                <label>Password</label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    id="password"
                    placeholder="Masukkan password">

                </div>

            </div>

            <!-- ROLE -->
            <div class="input-group">

                <label>Login Sebagai</label>

                <div class="input-box">

                    <i class="fa-solid fa-users"></i>

                    <select id="role">

                        <option value="siswa">
                            Siswa
                        </option>

                        <option value="admin">
                            Admin
                        </option>

                    </select>

                </div>

            </div>

            <!-- BUTTON -->
            <button class="login-btn"
            onclick="login()">

                <i class="fa-solid fa-right-to-bracket"></i>
                Masuk

            </button>

            <!-- REGISTER -->
            <div class="register-link">

                Belum punya akun?

                <a href="pages/register.html">
                    Daftar Sekarang
                </a>

            </div>

        </div>

    </div>

</section>

<!-- LOADING -->
<div id="loading"
style="display:none; text-align:center; margin-top:50px;">

    <h2>Loading...</h2>

</div>

<!-- JS -->
<script src="assets/js/script.js"></script>

</body>
</html>
